# complete_asm.yaml
# Configuration for the Complete Assembly robot

sim:
  headless: false
  load_extensions: true

player:
  fixed_time_step: true
  play_every_frame: false
  target_hz: 50

assets:
  usd_path: "/home/korea/isaacsim/isaaclab_real/complete_asm/complete_asm.urdf"
  spot_prim: "/World/complete_asm"
  ats_prim: ""
  imu_prim: ""

ros:
  use_sim_time: true
  dom_topic: "/odom"
  scan_topic: "/scan"
  point_cloud_topic: "/point_cloud"
  camera_topic: "/camera/image_raw"

policy:
  path: "/home/korea/isaacsim/logs/complete_asm/model.pt"
  device: "auto"

controls:
  spot_action_scale: 1.0
  ats_joint_step: 0.1
  teleop:
    lin_speed: 1.0
    ang_speed_yaw: 1.0
    ang_speed_pitch: 1.0
